services:
  mysql:
    image: mysql:8.0
    container_name: bdi_trabalho_final_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Defina MYSQL_ROOT_PASSWORD no .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Defina MYSQL_DATABASE no .env}
      MYSQL_USER: ${MYSQL_USER:?Defina MYSQL_USER no .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Defina MYSQL_PASSWORD no .env}
      TZ: America/Sao_Paulo
    ports:
      - "${MYSQL_PORT:?Defina MYSQL_PORT no .env}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/parte2_modelo_fisico.sql:/docker-entrypoint-initdb.d/01_modelo_fisico.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
